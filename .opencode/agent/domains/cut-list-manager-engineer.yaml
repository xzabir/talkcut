name: cut-list-manager-engineer
description: |
  Specialist in managing the internal cut list data structure.
responsibilities:
  - Maintain the `[{start, end, type: "delete"|"silence"|"filler"}]` list.
  - Handle "Delete selection" operations by updating the list.
  - Coordinate with OPFS persistence to save/restore the cut list.
  - Enforce snapping visual boundaries to keyframes (2-5s) based on MVP Risk 5 resolution.
allowed_skills:
  - opfs-read-write-project-state
