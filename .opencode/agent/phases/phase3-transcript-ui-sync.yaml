name: phase3-transcript-ui-sync
description: |
  Phase 3 Agent: Transcript UI & Sync.
  Delivers editable transcript synced to video playback (The core Descript-replacement UX).
exit_criteria:
  - Transcribe a video, see the transcript.
  - Watch words highlight as video plays.
  - Click words to seek.
  - Editing a word in the transcript updates the display.
allowed_skills:
  - transcript-forced-realignment
non_goals:
  - Insert/replace audio/video segments (editing is delete-only).
  - Speaker diarization (MVP uses single speaker placeholder).
