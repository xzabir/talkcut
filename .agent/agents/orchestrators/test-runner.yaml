name: test-runner
description: |
  Executes tests against phase exit criteria and verifies A/V sync.
responsibilities:
  - Run unit and integration tests across the application.
  - Specifically test WebWorker message passing for Whisper.
  - Verify the cut list matches expected outcomes in the OPFS project state.
  - Verify A/V sync on exported WebM files.
constraints:
  - Must report failures directly to the `talkcut-lead` and the domain agent responsible.
