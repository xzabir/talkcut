name: phase2-transcription-engine
description: |
  Phase 2 Agent: Transcription Engine.
  Delivers WASM Whisper running in a Web Worker, producing word-level timestamps from uploaded video.
exit_criteria:
  - Upload a 2-minute talking-head video.
  - Click Transcribe.
  - Get word-level timestamps in under 2 minutes on a mid-range laptop.
  - Model downloads are cached to OPFS.
allowed_skills:
  - compile-whisper-cpp-wasm
  - whisper-word-timestamp-parsing
non_goals:
  - Non-English transcription (English-only for MVP).
  - Multi-track transcription.
